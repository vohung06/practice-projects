<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/main.js"></script>
</head>

<body>
    <div id="turn-container">
        <h3>Turn For</h3>
        <div id="turn-box">
            <h4 class="player x active"> X </h4>
            <h4 class="player o"> O </h4>
        </div>
    </div>
    <main>
        <div class="box"> 0 </div>
        <div class="box"> 1 </div>
        <div class="box"> 2 </div>
        <div class="box"> 3 </div>
        <div class="box"> 4 </div>
        <div class="box"> 5 </div>
        <div class="box"> 6 </div>
        <div class="box"> 7 </div>
        <div class="box"> 8 </div>
    </main>
    <h2> X Win</h2>
    <button>Play Again</button>
</body>

</html>
