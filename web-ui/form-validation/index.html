<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="parent">
        <form id="form-1" action="">
            <div id="box">
                <h1>Tạo tài khoản</h1>
                <p>Nhập thông tin để bắt đầu</p>
            </div>
            <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <div>
                    <input id="fullname" name="fullname" type="text" placeholder="VD: Nguyễn Văn A">
                </div>
                <span class="message"></span>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="text" placeholder="VD: email@domain.com">
                <span class="message"></span>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input id="password" name="password" type="password" placeholder="Mật khẩu">
                <span class="message"></span>
            </div>
            <div class="form-group">
                <label for="confirm-password">Nhập lại mật khẩu</label>
                <input id="confirm-password" name="confirm-password" type="password" placeholder="Nhập lại mật khẩu">
                <span class="message"></span>
            </div>
            <button type="submit">
                Đăng ký
            </button>
        </form>
    </div>
    <script src="js/validator.js"></script>

    <script>
        Validator({
            form: "#form-1",
            formGroupSelector: ".form-group",
            errorSelector: ".message",
            rules: [
                Validator.isRequired("#fullname"),
                Validator.isRequired("#email"),
                Validator.isEmail("#email"),
                Validator.minLength("#password", 6),
                Validator.isRequired("#confirm-password"),
                Validator.isConfirmed("#confirm-password", function () {
                    return document.querySelector("#form-1 #password").value;
                }, "Mật khẩu nhập lại không chính xác"),
            ],
            onSubmit: function (data) {
                console.log(data);
            }
        });
    </script>
</body>

</html>
