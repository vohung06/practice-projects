<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="form-1">
        <div id="box">
            <h1>Tạo tài khoản</h1>
            <p>Nhập thông tin để bắt đầu</p>
        </div>
        <div class="form-group">
            <label for="fullname">Họ và tên</label>
            <input id="fullname" type="text" placeholder="VD: Nguyễn Văn A">
            <span class="message"></span>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="text" placeholder="VD: email@domain.com">
            <span class="message"></span>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input id="password" type="password" placeholder="Mật khẩu">
            <span class="message"></span>
        </div>
        <div class="form-group">
            <label for="confirm-password">Nhập lại mật khẩu</label>
            <input id="confirm-password" type="password" placeholder="Nhập lại mật khẩu">
            <span class="message"></span>
        </div>
        <button>
            Đăng ký
        </button>
    </div>
    <script src="js/validator.js"></script>

    <script>
        Validator({
            form: "#form-1",
            errorSelector: ".message",
            rules: [
                Validator.isRequired("#fullname"),
                Validator.isRequired("#email"),
                Validator.isEmail("#email"),
                Validator.minLength("#password", 6),
                Validator.isRequired("#confirm-password"),
                Validator.isConfirmed("#confirm-password", function () {
                    return document.querySelector("#form-1 #password").value;
                }, "Mật khẩu nhập lại không chính xác"),
            ]
        });
    </script>
</body>

</html>
