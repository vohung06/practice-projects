<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arono Toys Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/toys.css">
    <script src="js/main.js"></script>
</head>

<body>
    <header class="position-relative">

        <!-- ảnh nền -->
        <img src="img/banner_img.jpg" alt="banner" class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover">

        <!-- tạo chiều cao responsive -->
        <div class="ratio ratio-16x9"></div>

        <!-- form search -->
        <form
            class="position-absolute bottom-0 start-50 translate-middle-x translate-middle-md-x-0 start-md-auto end-md-0 w-75 w-md-50 w-lg-25 mb-3 me-md-3">

            <div class="input-group rounded-pill overflow-hidden shadow">

                <!-- input -->
                <input type="text" class="form-control border-0 py-2" placeholder="Search">

                <!-- icon -->
                <span class="input-group-text border-0 bg-white px-3">
                    <i class="bi bi-search"></i>
                </span>

            </div>

        </form>

    </header>
    <nav></nav>
    <main></main>
    <section></section>
    <footer></footer>
</body>

</html>
