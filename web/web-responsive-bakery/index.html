<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauket Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/web.css">
</head>

<body>
    <div>
        <!-- menu -->
        <nav class="navbar navbar-expand-sm px-sm-5 pt-sm-3">
            <!--logo-->
            <a class="navbar-brand mt-sm-3 " href="#">
                <img src="img/logo.png" alt="logo" class="w-50">
            </a>
            <!--button vùng con 1 của menu-->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent_1">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!--vùng con 1 của menu-->
            <div class="collapse navbar-collapse" id="navbarSupportedContent_1" data-bs-parent="#parent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link mx-sm-5 mx-1 rounded fs-5" href="#">Home</a>
                    </li>
                    <!--điều hướng lv2-->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle mx-sm-5 mx-1 rounded fs-5" href="#" role="button"
                            data-bs-toggle="dropdown">
                            Our Menu
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item fs-5" href="#">Jade</a></li>
                            <li><a class="dropdown-item fs-5" href="#">Astral Chocolate</a></li>
                            <li><a class="dropdown-item fs-5" href="#">Rosemary</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mx-sm-5 mx-1 rounded fs-5" href="#">Delivery Service</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mx-sm-5 mx-1 rounded fs-5" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>
        <main class="row container-fluid">
            <div class="col-sm-6">
                <!-- SLIDE ảnh -->
                <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                            class="active"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/Pic_Slide_01.png" class="d-block w-100" alt="Slide 1">
                        </div>
                        <div class="carousel-item">
                            <img src="img/Pic_Slide_02.png" class="d-block w-100" alt="Slide 2">
                        </div>
                        <div class="carousel-item">
                            <img src="img/Pic_Slide_03.png" class="d-block w-100" alt="Slide 3">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
            <div class="col-sm-6 ps-4">
                <h1 class="text-danger display-5 mt-3 fw-bold">Combination of</h1>
                <h2 class="display-2 fw-bold mt-1">Chocolate and Fresh Strawberry</h2>
                <p class="text-danger fs-5">Chocolate cake with premium ingredients combined with a sprinkling of a
                    chocolate
                    and strawberry into
                    a complex mix to accompany your day </p>
                <button type="button" class="btn btn-dark text-white fs-5 fw-bold mt-3">
                    Order Now
                </button>
            </div>

        <section>

        </section>

    </footer>
