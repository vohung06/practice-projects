<!DOCTYPE html>

<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="css/web.css">

<body>
  <div id="mother" class="mx-auto col-sm-11 col-12">
    <nav class="navbar navbar-expand-sm bg-success mt-sm-2 mx-auto rounded-4 border-0 border-sm">
      <div class="container-fluid">
        <!--button vung 1 -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent_1">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!--logo-->
        <a class="navbar-brand" href="#">
          <img src="vtgh/logo.png" alt="logo">
        </a>

        <!--button vung 2-->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent_2">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!--vung 1-->
        <div class="collapse navbar-collapse ms-sm-2 me-sm-5 w-25" id="navbarSupportedContent_1">
          <form>
            <div class="input-group mt-2 mt-sm-0">
              <input type="text" class="form-control" placeholder="Tìm kiếm">
              <span class="input-group-text">
                <i class="bi bi-search"></i>
              </span>
            </div>
          </form>
        </div>

        <!--vung 2-->
        <div class="collapse navbar-collapse w-75" id="navbarSupportedContent_2">
          <ul class="navbar-nav me-auto mb-2 mb-sm-0 ms-sm-5 text-start">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle fw-bold fs-5 text-white px-sm-2 ms-sm-5 me-sm-3" href="#" role="button"
                data-bs-toggle="dropdown" aria-expanded="false">
                Menu
              </a>
              <ul class="dropdown-menu bg-warning-subtle">
                <li><a class="dropdown-item text-warning fw-bold bg-warning-subtle" href="#">Pizza</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item text-warning fw-bold bg-warning-subtle" href="#">Spaghetti</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item text-warning fw-bold bg-warning-subtle" href="#">Pasta</a></li>
              </ul>
            </li>

            <li class="nav-item">
              <a class="nav-link active fw-bold fs-5 text-white px-sm-2 mx-sm-3" aria-current="page" href="#">Đặt
                hàng</a>
            </li>
            <li class="nav-item">
              <a class="nav-link fw-bold fs-5 text-white px-sm-2 ms-sm-3 me-sm-5" href="#">Liên lạc</a>
            </li>
          </ul>
          <button type="button" class="btn btn-warning d-flex align-items-center rounded-pill mx-sm-4">
            <img src="vtgh/user.png" alt="user">
            <span class="text-success fw-bold ps-2">
              Đăng nhập
            </span>
          </button>
        </div>
      </div>

    <main>
      <div class="row col-11 mx-auto">
        <!-- phần ảnh -->
        <div class="col-sm-4 col-12 mx-auto">
          <!-- hàng 1 -->
          <div class="row">
            <div class="col-sm-12 mx-auto">
              <img src="vtgh/banner_01.jpg" alt="banner 1" class="img-fluid mt-3 w-100 rounded-4">
            </div>
          </div>

          <!-- hàng 2 -->
          <div class="row">
            <div class="col-sm-6 col-12 mx-auto">
              <img src="vtgh/banner_02.jpg" alt="banner 2" class="img-fluid mt-2 w-100 rounded-4">
            </div>

            <div class="col-sm-6 col-12 mx-auto">
              <img src="vtgh/banner_03.jpg" alt="banner 3" class="img-fluid mt-2 w-100 rounded-4">
            </div>
          </div>
        </div>

        <!-- vùng slide -->
        <div class="col-sm-8 col-12">
          <div id="carouselExampleIndicators" class="carousel slide mt-3 h-125" data-bs-ride="carousel">
            <div class="carousel-indicators">
              <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                class="active"></button>
              <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
              <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="vtgh/Slide_01.png" class="d-block w-100" alt="Slide 1">
              </div>
              <div class="carousel-item">
                <img src="vtgh/Slide_02.png" class="d-block w-100" alt="Slide 2">
              </div>
              <div class="carousel-item">
                <img src="vtgh/Slide_03.png" class="d-block w-100" alt="Slide 3">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-12 col-12">
        <h1 class="text-danger fs-4 fw-bold">The Pizza Company - Pizza Phong vị Ý</h1>
        <p><span class="text-success fw-bold">The PIZZA Company</span> thuộc sở hữu của tập đoàn Minor Food Group, tụ
          hào cung cấp cho khách hàng gần 20
          loại bánh pizza thơm ngon với nhân bánh dày đặc trưng nổi bật và phô mai hảo hạng</p>
      </div>

    </section>
