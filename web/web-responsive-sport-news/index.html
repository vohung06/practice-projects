<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Sport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/sport-news.css">
    <script src="js/main,js"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-dark bg-dark py-2">
            <div class="container-fluid">
                <!-- Logo-->
                <a class="navbar-brand mx-sm-3 mx-1" href=" #">
                    <img src="img/logo.png" alt="logo">
                    <span class="fw-bold fs-4 ms-2 pt-2">
                        <span class="text-light">Sport</span>
                        <span class="text-danger">360</span>
                    </span>
                </a>

                <!-- Button Control-->
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent1">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Button Login -->
                <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent1"
                    data-bs-toggle="modal" data-bs-target="#loginModal">
                    <button type="button"
                        class="btn btn-danger px-4 rounded-pill fw-semibold me-sm-4 me-2 mt-1 mt-sm-0">
                        Sign in / Sign up
                    </button>
                </div>

                <!--Form Login-->
                <div class="modal fade" id="loginModal" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                            <!-- Header -->
                            <div class="modal-header bg-dark text-danger border-0">
                                <h4 class="modal-title fw-bold">
                                    <span class="text-light">Sport</span> 360
                                </h4>

                                <button class="btn-close btn-close-white" data-bs-dismiss="modal">
                                </button>
                            </div>
                            <!-- Body -->
                            <div class="modal-body p-4">
                                <h3 class="text-center fw-bold mb-1">
                                    Welcome Back
                                </h3>
                                <p class="text-center text-muted mb-4">
                                    Sign in to your account
                                </p>
                                <!-- Form -->
                                <form>

                                    <!-- Email -->
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">
                                            Email
                                        </label>

                                        <input type="email" class="form-control form-control-lg rounded-3"
                                            placeholder="Enter your email">
                                    </div>
                                    <!-- Password -->
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">
                                            Password
                                        </label>

                                        <input type="password" class="form-control form-control-lg rounded-3"
                                            placeholder="Enter password">
                                    </div>
                                    <!-- Remember + Forgot -->
                                    <div class="d-flex justify-content-between align-items-center mb-4">

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="remember">

                                            <label class="form-check-label" for="remember">
                                                Remember me
                                            </label>
                                        </div>

                                        <a href="#" class="text-danger text-decoration-none fw-semibold">
                                            Forgot password?
                                        </a>

                                    </div>

                                    <!-- Login Button -->
                                    <button type="submit" class="btn btn-danger w-100 py-2 rounded-3 fw-bold fs-5">
                                        Sign in
                                    </button>
                                </form>
                                <div class="d-flex align-items-center my-4">
                                    <hr class="flex-grow-1">
                                    <span class="px-3 text-muted fw-semibold">
                                        OR
                                    </span>
                                    <hr class="flex-grow-1">
                                </div>
                                <!-- Social Login -->
                                <div class="d-grid gap-2">
                                    <button class="btn btn-outline-dark rounded-3">
                                        Sign in with Google
                                    </button>
                                    <button class="btn btn-outline-primary rounded-3">
                                        Sign in with Facebook
                                    </button>
                                </div>
                                <!-- Register -->
                                <p class="text-center mt-4 mb-0">
                                    Don't have an account?
                                    <a href="#" class="text-danger fw-bold text-decoration-none">
                                        Sign up now
                                    </a>
                                </p>

                            </div>
                        </div>
                    </div>
                </div>
        </nav>
    </header>
    <section id="banner">
        <img src="img/banner.jpg" alt="banner" class="img-fluid w-100">
    </section>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark mb-2">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent2">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent2">
                <ul class="navbar-nav mx-sm-5 ms-2 mb-2 mb-sm-0">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold fs-5 mx-sm-4" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold fs-5 mx-sm-4" href="#">Breaking News</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold fs-5 mx-sm-4" href="#">Football</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold fs-5 mx-sm-4" href="#">Highlights</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white fw-semibold fs-5 mx-sm-4" href="#" role="button"
                            data-bs-toggle="dropdown">
                            More
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item fw-semibold fs-5" href="#">Basketball</a></li>
                            <li><a class="dropdown-item fw-semibold fs-5" href="#">Tennis</a></li>
                            <li><a class="dropdown-item fw-semibold fs-5" href="#">Esports</a></li>
                            <li><a class="dropdown-item fw-semibold fs-5" href="#">Interview</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="ms-sm-auto mt-3 mt-sm-0 me-sm-4 ms-2">
                    <div class="input-group rounded-pill overflow-hidden">
                        <!-- input -->
                        <input type="text" class="form-control bg-light text-white py-2" placeholder="Search ">
                        <!-- icon -->
                        <span class="input-group-text bg-light px-3">
                            <i class="bi bi-search"></i>
                        </span>
                    </div>
                </form>

            </div>
        </div>
    </nav>
    <main>
        <div id="carouselExampleIndicators" class="carousel slide col-sm-6">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                    aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                    aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                    aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="img/slide_img1.webp" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="img/slide_img2.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="img/slide_img3.png" class="d-block w-100" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </main>
    <section>

    </section>
    <footer>

    </footer>
</body>

</html>
